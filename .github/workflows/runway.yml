name: Runway

on:
  repository_dispatch:
    types: [runway]
  workflow_dispatch:
    inputs:
      prompt:
        description: "Prompt for the Claude agent"
        required: true
        type: string
      gh_token:
        description: "GitHub token for gh CLI auth (e.g. a PAT to create PRs as yourself)"
        required: true
        type: string
      runner:
        description: "Runner to use"
        required: false
        type: choice
        default: "linux.aws.h100"
        options:
          - linux.aws.h100
          - linux.aws.a100
          - linux.c7i.4xlarge

jobs:
  run_agent:
    name: runway_${{ github.run_id }}
    if: github.repository == 'pytorch/pytorch'
    runs-on: ${{ github.event.client_payload.runner || inputs.runner || 'linux.aws.h100' }}
    timeout-minutes: 120
    environment: bedrock
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Resolve runner config
        id: config
        env:
          RUNNER: ${{ github.event.client_payload.runner || inputs.runner || 'linux.aws.h100' }}
        run: |
          case "${RUNNER}" in
            linux.aws.h100*)
              echo "docker-image=ci-image:pytorch-linux-jammy-cuda12.8-cudnn9-py3-gcc11" >> "$GITHUB_OUTPUT"
              echo "build-env=linux-jammy-cuda12.8-cudnn9-py3-gcc11" >> "$GITHUB_OUTPUT"
              echo "cuda-arch=9.0" >> "$GITHUB_OUTPUT"
              echo "gpu=true" >> "$GITHUB_OUTPUT"
              echo "gpu-name=H100" >> "$GITHUB_OUTPUT"
              ;;
            linux.aws.a100*)
              echo "docker-image=ci-image:pytorch-linux-jammy-cuda12.8-cudnn9-py3-gcc11" >> "$GITHUB_OUTPUT"
              echo "build-env=linux-jammy-cuda12.8-cudnn9-py3-gcc11" >> "$GITHUB_OUTPUT"
              echo "cuda-arch=8.0" >> "$GITHUB_OUTPUT"
              echo "gpu=true" >> "$GITHUB_OUTPUT"
              echo "gpu-name=A100" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "docker-image=ci-image:pytorch-linux-jammy-py3.10-gcc11" >> "$GITHUB_OUTPUT"
              echo "build-env=linux-jammy-py3.10-gcc11" >> "$GITHUB_OUTPUT"
              echo "cuda-arch=" >> "$GITHUB_OUTPUT"
              echo "gpu=false" >> "$GITHUB_OUTPUT"
              echo "gpu-name=none" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Checkout PyTorch
        uses: pytorch/pytorch/.github/actions/checkout-pytorch@main
        with:
          no-sudo: true

      - name: Setup Linux
        uses: ./.github/actions/setup-linux

      - name: Login to ECR
        uses: ./.github/actions/ecr-login

      - name: Calculate docker image
        id: calculate-docker-image
        uses: pytorch/test-infra/.github/actions/calculate-docker-image@main
        with:
          docker-image-name: ${{ steps.config.outputs.docker-image }}

      - name: Pull docker image
        uses: pytorch/test-infra/.github/actions/pull-docker-image@main
        with:
          docker-image: ${{ steps.calculate-docker-image.outputs.docker-image }}

      - name: Start build container
        id: docker
        env:
          DOCKER_IMAGE: ${{ steps.calculate-docker-image.outputs.docker-image }}
          BUILD_ENVIRONMENT: ${{ steps.config.outputs.build-env }}
          TORCH_CUDA_ARCH_LIST: ${{ steps.config.outputs.cuda-arch }}
          HAS_GPU: ${{ steps.config.outputs.gpu }}
        run: |
          TOTAL_AVAILABLE_MEMORY_IN_GB=$(awk '/MemTotal/ { printf "%.0f", $2/1024/1024 - 1 }' /proc/meminfo)
          TOTAL_MEMORY_WITH_SWAP=$((TOTAL_AVAILABLE_MEMORY_IN_GB + 3))

          GPU_ARGS=""
          if [ "${HAS_GPU}" = "true" ]; then
            GPU_ARGS="--gpus all -e NVIDIA_DRIVER_CAPABILITIES=all --shm-size=2g"
          fi

          # GPU_ARGS is intentionally unquoted to allow word splitting
          # shellcheck disable=SC2086
          container_name=$(docker run \
            ${GPU_ARGS} \
            -e BUILD_ENVIRONMENT \
            -e MAX_JOBS="$(nproc --ignore=2)" \
            -e TORCH_CUDA_ARCH_LIST \
            -e SCCACHE_BUCKET=ossci-compiler-cache-circleci-v2 \
            -e SCCACHE_REGION=us-east-1 \
            -e SKIP_SCCACHE_INITIALIZATION=1 \
            --env-file="/tmp/github_env_${GITHUB_RUN_ID}" \
            --memory="${TOTAL_AVAILABLE_MEMORY_IN_GB}g" \
            --memory-swap="${TOTAL_MEMORY_WITH_SWAP}g" \
            --security-opt seccomp=unconfined \
            --cap-add=SYS_PTRACE \
            --tty \
            --detach \
            --user jenkins \
            -v "${GITHUB_WORKSPACE}:/var/lib/jenkins/workspace" \
            -w /var/lib/jenkins/workspace \
            "${DOCKER_IMAGE}" \
          )
          echo "container-name=${container_name}" >> "$GITHUB_OUTPUT"

      - name: Build PyTorch
        env:
          CONTAINER: ${{ steps.docker.outputs.container-name }}
        run: |
          docker exec -t "${CONTAINER}" sh -c '.ci/pytorch/build.sh'

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::308535385114:role/gha_workflow_claude_code
          aws-region: us-east-1

      - name: Setup git identity
        run: |
          git config --global user.email "claude-agent@users.noreply.github.com"
          git config --global user.name "Claude Agent"

      - name: Authenticate gh CLI
        env:
          GH_TOKEN: ${{ github.event.client_payload.gh_token || inputs.gh_token || secrets.GITHUB_TOKEN }}
        run: |
          echo "::add-mask::${GH_TOKEN}"
          echo "${GH_TOKEN}" | gh auth login --with-token
          echo "gh CLI authenticated successfully"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Agent
        env:
          CLAUDE_CODE_USE_BEDROCK: "1"
          ANTHROPIC_MODEL: global.anthropic.claude-opus-4-6-v1
          PROMPT: ${{ github.event.client_payload.prompt || inputs.prompt || 'List the files in the current directory and print hello world. Do not make any changes.' }}
          CONTAINER: ${{ steps.docker.outputs.container-name }}
          GPU_NAME: ${{ steps.config.outputs.gpu-name }}
          HAS_GPU: ${{ steps.config.outputs.gpu }}
        run: |
          set -euo pipefail

          claude -p "You are running as an autonomous agent in PyTorch CI.
          Your goal is to complete the task below, then create a pull request with your changes.

          ENVIRONMENT:
          You are running on the host machine. A Docker container is running alongside
          you with PyTorch already built and all dependencies installed. The repository
          checkout is bind-mounted into the container, so when you edit files with
          Read/Write/Edit they are immediately visible inside the container.

          You MUST use docker exec to run Python, tests, or builds because Python and
          PyTorch are installed inside the container, not on the host:
            docker exec -t ${CONTAINER} sh -c 'python test/test_torch.py -k test_abs'
            docker exec -t ${CONTAINER} sh -c '.ci/pytorch/build.sh'
          $([ "${HAS_GPU}" = "true" ] && echo "
          A ${GPU_NAME} GPU is available inside the container.")

          Use git and gh directly on the host (not inside docker exec).

          TASK:
          ${PROMPT}

          INSTRUCTIONS:
          - Read and understand the relevant code before making changes
          - Follow the coding style in CLAUDE.md
          - Make the necessary code changes
          - Run relevant tests inside the container to validate your changes
          - If tests fail, fix the issues and retest
          - Create a new branch, commit your changes with a clear commit message, and push it
          - Create a PR using gh pr create against the main branch
          - Include [Runway] in the PR title
          - In the PR body, include the original prompt and a link to this workflow run: ${GH_RUN_URL}" \
            --allowedTools 'Bash,Read,Write,Edit,Glob,Grep' \
            --max-turns 30

      - name: Upload usage metrics
        if: always()
        uses: pytorch/test-infra/.github/actions/upload-claude-usage@main

concurrency:
  group: runway-${{ github.run_id }}
  cancel-in-progress: true
